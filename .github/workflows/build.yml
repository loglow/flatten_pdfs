# Builds both apps on every push to main (and on demand from the Actions
# tab via "Run workflow"). Each job runs the same double-clickable build
# script used locally — the scripts skip their interactive prompts when the
# CI environment variable is set — and uploads the finished build folder as
# a downloadable artifact.
name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  mac:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build
        run: ./mac/Build.command

      # Zip with ditto before uploading: artifact packaging alone does not
      # preserve the executable permissions inside a .app bundle.
      - name: Package app bundle
        run: ditto -c -k --keepParent mac/build/*.app "Flatten-PDFs-macOS.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: Flatten-PDFs-macOS
          path: Flatten-PDFs-macOS.zip

  winforms:
    name: Windows (WinForms)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Build
        shell: cmd
        run: |
          call "winforms\Build.cmd"
          exit /b %ERRORLEVEL%

      - uses: actions/upload-artifact@v7
        with:
          name: Flatten-PDFs-WinForms
          path: winforms/build/

  winui:
    name: Windows (WinUI)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Build
        shell: cmd
        run: |
          call "winui\Build.cmd"
          exit /b %ERRORLEVEL%

      - uses: actions/upload-artifact@v7
        with:
          name: Flatten-PDFs-WinUI
          path: winui/build/

  gtk:
    name: Linux (GTK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install GTK dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-gi gir1.2-gtk-4.0 gir1.2-adw-1

      - name: Build
        run: ./gtk/Build.sh

      # Tar before uploading: artifact packaging alone does not preserve the
      # launcher's executable permission.
      - name: Package
        run: tar -czf Flatten-PDFs-Linux.tar.gz -C gtk/build .

      - uses: actions/upload-artifact@v7
        with:
          name: Flatten-PDFs-Linux
          path: Flatten-PDFs-Linux.tar.gz
